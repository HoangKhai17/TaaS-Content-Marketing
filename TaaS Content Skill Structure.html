<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaaS Content Skill Structure</title>
  <style>
    body {
      font-family: sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      color: #1a1a1a;
    }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #3d3d3a; }
    svg text.th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    svg text.ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
    svg text.t  { font-size: 14px; font-weight: 400; fill: #1a1a1a; }

    /* Color ramps */
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple text.th { fill: #3C3489; }
    .c-purple text.ts { fill: #534AB7; }

    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal text.th { fill: #085041; }
    .c-teal text.ts { fill: #0F6E56; }

    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral text.th { fill: #712B13; }
    .c-coral text.ts { fill: #993C1D; }

    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber text.th { fill: #633806; }
    .c-amber text.ts { fill: #854F0B; }

    .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray text.th { fill: #444441; }
    .c-gray text.ts { fill: #5F5E5A; }

    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue text.th { fill: #0C447C; }
    .c-blue text.ts { fill: #185FA5; }

    .c-purple-step rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple-step text.th { fill: #3C3489; }
    .c-purple-step text.ts { fill: #534AB7; }

    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green text.th { fill: #27500A; }
    .c-green text.ts { fill: #3B6D11; }

    .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    .node { cursor: pointer; }
    .node:hover rect { opacity: 0.85; }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1c; color: #e0ddd4; }
      h1 { color: #c2c0b6; }
      svg text.th { fill: #e0ddd4; }
      svg text.ts { fill: #9c9a92; }

      .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
      .c-purple text.th { fill: #CECBF6; }
      .c-purple text.ts { fill: #AFA9EC; }

      .c-teal rect { fill: #085041; stroke: #5DCAA5; }
      .c-teal text.th { fill: #9FE1CB; }
      .c-teal text.ts { fill: #5DCAA5; }

      .c-coral rect { fill: #712B13; stroke: #F0997B; }
      .c-coral text.th { fill: #F5C4B3; }
      .c-coral text.ts { fill: #F0997B; }

      .c-amber rect { fill: #633806; stroke: #EF9F27; }
      .c-amber text.th { fill: #FAC775; }
      .c-amber text.ts { fill: #EF9F27; }

      .c-gray rect { fill: #444441; stroke: #B4B2A9; }
      .c-gray text.th { fill: #D3D1C7; }
      .c-gray text.ts { fill: #B4B2A9; }

      .c-blue rect { fill: #0C447C; stroke: #85B7EB; }
      .c-blue text.th { fill: #B5D4F4; }
      .c-blue text.ts { fill: #85B7EB; }

      .c-green rect { fill: #27500A; stroke: #97C459; }
      .c-green text.th { fill: #C0DD97; }
      .c-green text.ts { fill: #97C459; }

      .arr { stroke: #888780; }
    }
  </style>
</head>
<body>
  <h1>TaaS Content Marketing — Cấu trúc Skill</h1>
  <svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- SKILL.md chính -->
    <g class="node c-purple">
      <rect x="200" y="20" width="280" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="44" text-anchor="middle" dominant-baseline="central">taas-content-marketing/</text>
      <text class="ts" x="340" y="62" text-anchor="middle" dominant-baseline="central">SKILL.md — Router chính + pipeline tổng quát</text>
    </g>

    <!-- Arrows to 4 branches -->
    <line x1="240" y1="76" x2="100" y2="170" class="arr" marker-end="url(#arrow)"/>
    <line x1="300" y1="76" x2="230" y2="170" class="arr" marker-end="url(#arrow)"/>
    <line x1="380" y1="76" x2="420" y2="170" class="arr" marker-end="url(#arrow)"/>
    <line x1="440" y1="76" x2="560" y2="170" class="arr" marker-end="url(#arrow)"/>

    <!-- 4 content types -->
    <g class="node c-teal">
      <rect x="30" y="170" width="140" height="52" rx="8" stroke-width="0.5"/>
      <text class="th" x="100" y="192" text-anchor="middle" dominant-baseline="central">tin-cong-ty/</text>
      <text class="ts" x="100" y="210" text-anchor="middle" dominant-baseline="central">Company news</text>
    </g>

    <g class="node c-teal">
      <rect x="180" y="170" width="140" height="52" rx="8" stroke-width="0.5"/>
      <text class="th" x="250" y="192" text-anchor="middle" dominant-baseline="central">tin-cong-nghe/</text>
      <text class="ts" x="250" y="210" text-anchor="middle" dominant-baseline="central">Tech news</text>
    </g>

    <g class="node c-coral">
      <rect x="340" y="170" width="140" height="52" rx="8" stroke-width="0.5"/>
      <text class="th" x="410" y="192" text-anchor="middle" dominant-baseline="central">case-study/</text>
      <text class="ts" x="410" y="210" text-anchor="middle" dominant-baseline="central">Customer stories</text>
    </g>

    <g class="node c-amber">
      <rect x="500" y="170" width="140" height="52" rx="8" stroke-width="0.5"/>
      <text class="th" x="570" y="192" text-anchor="middle" dominant-baseline="central">insight/</text>
      <text class="ts" x="570" y="210" text-anchor="middle" dominant-baseline="central">Thought leadership</text>
    </g>

    <!-- Arrow to utils -->
    <line x1="340" y1="222" x2="340" y2="300" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

    <!-- utils -->
    <g class="node c-gray">
      <rect x="160" y="300" width="360" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="322" text-anchor="middle" dominant-baseline="central">utils/</text>
      <text class="ts" x="340" y="340" text-anchor="middle" dominant-baseline="central">ghost_client.py · image_gen.py · seo_validator.py</text>
    </g>

    <!-- Separator -->
    <line x1="40" y1="390" x2="640" y2="390" stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="4 3"/>
    <text class="ts" x="340" y="406" text-anchor="middle">Pipeline 7 bước (theo mô hình AI Content Agent)</text>

    <!-- 7 pipeline steps -->
    <g class="node c-blue">
      <rect x="28" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="65" y="442" text-anchor="middle" dominant-baseline="central">1</text>
      <text class="ts" x="65" y="460" text-anchor="middle" dominant-baseline="central">Nhập topic</text>
    </g>
    <line x1="102" y1="448" x2="118" y2="448" class="arr" marker-end="url(#arrow)"/>

    <g class="node c-blue">
      <rect x="118" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="155" y="442" text-anchor="middle" dominant-baseline="central">2</text>
      <text class="ts" x="155" y="460" text-anchor="middle" dominant-baseline="central">Nghiên cứu</text>
    </g>
    <line x1="192" y1="448" x2="208" y2="448" class="arr" marker-end="url(#arrow)"/>

    <g class="node c-blue">
      <rect x="208" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="245" y="442" text-anchor="middle" dominant-baseline="central">3</text>
      <text class="ts" x="245" y="460" text-anchor="middle" dominant-baseline="central">Lập dàn ý</text>
    </g>
    <line x1="282" y1="448" x2="298" y2="448" class="arr" marker-end="url(#arrow)"/>

    <g class="node c-purple">
      <rect x="298" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="335" y="442" text-anchor="middle" dominant-baseline="central">4</text>
      <text class="ts" x="335" y="460" text-anchor="middle" dominant-baseline="central">Viết bài</text>
    </g>
    <line x1="372" y1="448" x2="388" y2="448" class="arr" marker-end="url(#arrow)"/>

    <g class="node c-coral">
      <rect x="388" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="425" y="442" text-anchor="middle" dominant-baseline="central">5</text>
      <text class="ts" x="425" y="460" text-anchor="middle" dominant-baseline="central">Tạo ảnh</text>
    </g>
    <line x1="462" y1="448" x2="478" y2="448" class="arr" marker-end="url(#arrow)"/>

    <g class="node c-amber">
      <rect x="478" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="515" y="442" text-anchor="middle" dominant-baseline="central">6</text>
      <text class="ts" x="515" y="460" text-anchor="middle" dominant-baseline="central">SEO + QC</text>
    </g>
    <line x1="552" y1="448" x2="568" y2="448" class="arr" marker-end="url(#arrow)"/>

    <g class="node c-green">
      <rect x="568" y="420" width="74" height="56" rx="7" stroke-width="0.5"/>
      <text class="th" x="605" y="442" text-anchor="middle" dominant-baseline="central">7</text>
      <text class="ts" x="605" y="460" text-anchor="middle" dominant-baseline="central">Xuất bản</text>
    </g>

    <!-- Tags -->
    <text class="ts" x="340" y="510" text-anchor="middle">Tags Ghost: tin-cong-ty · tin-cong-nghe · case-study · insight</text>

    <!-- Env config -->
    <g class="node c-gray">
      <rect x="60" y="530" width="560" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="340" y="548" text-anchor="middle" dominant-baseline="central">env.example</text>
      <text class="ts" x="340" y="565" text-anchor="middle" dominant-baseline="central">GHOST_API_URL · GHOST_ADMIN_KEY · KIE_API_KEY · UNSPLASH_KEY</text>
    </g>
  </svg>
</body>
</html>
